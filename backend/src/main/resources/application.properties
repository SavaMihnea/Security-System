# ==========================================
# CORS — set CORS_ORIGIN env var in production
# ==========================================
cors.allowed-origin=${CORS_ORIGIN:http://localhost:8080}

# ==========================================
# SERVER
# ==========================================
server.port=${PORT:8080}

# ==========================================
# DATABASE — Railway sets MYSQL_URL, MYSQL_USER, MYSQL_PASSWORD automatically
# For local dev, falls back to localhost defaults
# ==========================================
spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/security_system?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:SecSystem2025Root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ==========================================
# JWT — set JWT_SECRET env var in production
# ==========================================
jwt.secret=${JWT_SECRET:aHaeFJ1zqc9PEqlFaHUktve25do0eIaccMqZ8hGViPAGKtCXiqfkCYq7bYtAyKBv}
jwt.expiration-ms=3600000

# ==========================================
# ESP32 API KEY — set ESP_API_KEY env var in production
# ==========================================
esp.api-key=${ESP_API_KEY:pFTF3EJ3MEKx0NE5sO1tAGouPNNeYwJ5CsPAg2zVUXgjevad}

# ==========================================
# OPENAI — set OPENAI_API_KEY env var in production
# ==========================================
openai.api-key=${OPENAI_API_KEY:}

# ==========================================
# LOGGING
# ==========================================
logging.level.com.securitysystem=${LOG_LEVEL:DEBUG}
logging.level.org.springframework.security=WARN

# Force JSON to format dates as ISO strings with UTC 'Z'
spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ss.SSS'Z'
spring.jackson.time-zone=UTC

# Ensure Hibernate/MySQL uses UTC for the connection
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE