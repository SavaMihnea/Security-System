<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script>document.documentElement.setAttribute('data-theme',localStorage.getItem('voxwall-theme')||'dark')</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VOXWALL - Sensors</title>
  <link rel="icon" type="image/png" href="/assets/keylogo.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="preload" as="image" href="/assets/keylogo.png">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body style="visibility:hidden;">

<nav class="vox-nav">
  <a class="vox-nav-brand" href="/dashboard">
    <span class="brand-dot"></span>VOXWALL SECURITY
  </a>
  <div class="vox-nav-links">
    <a href="/dashboard" class="vox-nav-link">Dashboard</a>
    <a href="/sensors"   class="vox-nav-link active">Sensors</a>
    <a href="/events"    class="vox-nav-link">Events</a>
    <a href="/help"      class="vox-nav-link">Help</a>
    <a href="/about"     class="vox-nav-link">About</a>
    <button id="btnSettings" class="vox-nav-logout" onclick="openSettingsModal()" style="background:none;">&#9881;</button>
    <button class="btn-theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme"></button>
    <button class="vox-nav-logout" onclick="logout()">Logout</button>
  </div>
  <button class="vox-nav-hamburger" onclick="toggleNavMenu()" aria-label="Menu">&#9776;</button>
</nav>

<div class="page-wrap">
  <div class="d-flex justify-content-between align-items-end mb-4 flex-wrap gap-3">
    <div class="page-header" style="margin:0;">
      <div class="page-eyebrow">Node Registry</div>
      <div class="page-title">Sensors</div>
    </div>
    <div style="display:flex;align-items:center;gap:12px;">
      <span id="wsIndicator" style="font-family:'JetBrains Mono',monospace;font-size:0.72rem;color:var(--text-3);">Connecting…</span>
      <button class="btn-arm btn-arm-home" onclick="loadSensors()">Refresh</button>
    </div>
  </div>

  <div id="emptyState" class="d-none" style="text-align:center;padding:72px 0;">
    <div style="font-size:0.78rem;font-family:'JetBrains Mono',monospace;letter-spacing:0.16em;color:var(--text-3);text-transform:uppercase;">No nodes registered</div>
    <div style="margin-top:10px;font-size:0.84rem;color:var(--text-4);">Power on a sensor node to auto-register it to the system.</div>
  </div>

  <div class="row g-3" id="sensorCards"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1.6.1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7.0.0/bundles/stomp.umd.min.js"></script>
<script src="assets/js/api.js"></script>
<script src="assets/js/settings.js"></script>
<script>
  requireAuth();
  if (!isAdmin()) { const g = document.getElementById('btnSettings'); if (g) g.style.display = 'none'; }

  const STATUS_BADGE = { ONLINE:'bg-success', OFFLINE:'bg-secondary', TRIGGERED:'bg-danger', FAULT:'bg-warning' };
  const STATUS_CLASS = { ONLINE:'s-online', OFFLINE:'s-offline', TRIGGERED:'s-triggered', FAULT:'s-fault' };
  const TYPE_ICON = {
    MOTION:    `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="square"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`,
    VIBRATION: `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="square"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>`,
    DOOR:      `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="square"><rect x="3" y="2" width="18" height="20"/><circle cx="15.5" cy="12" r="1" fill="currentColor"/></svg>`,
    CENTRAL:   `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="square"><rect x="2" y="3" width="20" height="14"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>`
  };

  const SENSOR_REFRESH_EVENTS = new Set([
    'MOTION_DETECTED','VIBRATION_DETECTED','DOOR_OPENED','DOOR_CLOSED',
    'NODE_ONLINE','NODE_OFFLINE','ALARM_TRIGGERED','ALARM_DISARMED','SIREN_ACTIVE'
  ]);

  async function loadSensors() {
    const container  = document.getElementById('sensorCards');
    const emptyState = document.getElementById('emptyState');
    const sensors    = await apiFetch('/api/sensors').then(r => r?.json()).catch(() => []);

    if (!sensors || sensors.length === 0) {
      container.innerHTML = '';
      emptyState.classList.remove('d-none');
      return;
    }

    emptyState.classList.add('d-none');
    container.innerHTML = sensors.map(s => `
      <div class="col-12 col-md-6 col-xl-4 sensor-card-enter">
        <div class="sensor-card ${STATUS_CLASS[s.status] || 's-offline'} tac">
          <span class="tc-tr"></span><span class="tc-bl"></span>
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;">
            <div style="display:flex;align-items:center;gap:14px;">
              <div class="sensor-card-icon" style="color:${s.status==='ONLINE'?'var(--green)':s.status==='TRIGGERED'?'var(--red)':'var(--text-3)'}">
                ${TYPE_ICON[s.type] || ''}
              </div>
              <div>
                <div class="sensor-card-name">${s.name}</div>
                <div class="sensor-card-meta">${s.type}</div>
              </div>
            </div>
            <span class="badge ${STATUS_BADGE[s.status] || 'bg-secondary'}">${s.status}</span>
          </div>
          <div>
            <div class="sensor-kv">
              <span class="sensor-kv-key">Location</span>
              <span class="sensor-kv-val">${s.location || '-'}</span>
            </div>
            <div class="sensor-kv">
              <span class="sensor-kv-key">Node ID</span>
              <span class="sensor-kv-val" style="font-size:0.68rem;">${s.nodeId}</span>
            </div>
            <div class="sensor-kv">
              <span class="sensor-kv-key">Last Seen</span>
              <span class="sensor-kv-val">${s.lastSeen ? new Date(s.lastSeen).toLocaleString() : 'Never'}</span>
            </div>
          </div>
        </div>
      </div>
    `).join('');
  }

  function connectWebSocket() {
    const client = new StompJs.Client({
      webSocketFactory: () => new SockJS('/ws'),
      reconnectDelay: 5000,
      onConnect: () => {
        document.getElementById('wsIndicator').innerHTML =
          '<span class="ws-live">Live</span>';
        client.subscribe('/topic/events', (message) => {
          const event = JSON.parse(message.body);
          if (SENSOR_REFRESH_EVENTS.has(event.eventType)) {
            loadSensors();
          }
        });
      },
      onDisconnect: () => {
        document.getElementById('wsIndicator').innerHTML =
          '<span style="color:var(--red);font-size:0.72rem;font-family:\'JetBrains Mono\',monospace;">Offline</span>';
      }
    });
    client.activate();
  }

  loadSensors();
  connectWebSocket();
</script>
</body>
</html>
