<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOXWALL - Sensors</title>
    <link rel="icon" type="image/png" href="/assets/keylogo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    <link rel="preload" as="image" href="/assets/keylogo.png">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-dark text-white" style="visibility:hidden;">

<nav class="navbar navbar-dark bg-black border-bottom border-secondary px-4">
    <a class="navbar-brand" href="/dashboard" style="font-family:'Rajdhani','Segoe UI',sans-serif; font-weight:700; font-size:1.2rem; letter-spacing:0.15em; text-transform:uppercase; color:#fff; text-shadow:0 0 12px rgba(180,0,20,0.6);">VOXWALL SECURITY</a>
    <div class="d-flex gap-3 align-items-center">
        <a href="/dashboard" class="nav-link text-secondary">Dashboard</a>
        <a href="/sensors"   class="nav-link text-white fw-semibold active">Sensors</a>
        <a href="/events"    class="nav-link text-secondary">Events</a>
        <button class="btn btn-sm btn-outline-secondary" onclick="logout()">Logout</button>
    </div>
</nav>

<div class="container-fluid px-4 py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="mb-0">Sensors</h4>
        <div class="d-flex gap-2">
            <button class="btn btn-sm btn-outline-success" id="simulateBtn" onclick="simulateSensor()">+ Simulate Sensor</button>
            <button class="btn btn-sm btn-outline-light" onclick="loadSensors()">↺ Refresh</button>
        </div>
    </div>

    <!-- Empty state -->
    <div id="emptyState" class="d-none text-center py-5">
        <div style="font-size:3.5rem; opacity:0.3; margin-bottom:1rem;">📡</div>
        <h5 class="text-muted mb-2">No sensors detected yet</h5>
        <p class="text-secondary small mb-4" style="max-width:340px; margin:0 auto;">Power on a sensor node to auto-register, or simulate one for testing.</p>
        <button class="btn btn-outline-success btn-sm px-4" onclick="simulateSensor()">+ Simulate Sensor</button>
    </div>

    <div class="row g-3" id="sensorCards"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/api.js"></script>
<script>
    requireAuth();

    const STATUS_BADGE = {
        ONLINE:    'bg-success',
        OFFLINE:   'bg-secondary',
        TRIGGERED: 'bg-danger',
        FAULT:     'bg-warning text-dark'
    };
    const TYPE_ICON = {
        MOTION:    '👁',
        VIBRATION: '📳',
        DOOR:      '🚪',
        CENTRAL:   '🖥'
    };

    async function simulateSensor() {
        const btn = document.getElementById('simulateBtn');
        btn.disabled = true;
        btn.textContent = 'Creating...';
        try {
            await apiFetch('/api/sensors/simulate', { method: 'POST' });
            await loadSensors();
        } catch(e) {
            console.error('Simulate failed', e);
        }
        btn.disabled = false;
        btn.textContent = '+ Simulate Sensor';
    }

    async function loadSensors() {
        const container = document.getElementById('sensorCards');
        const emptyState = document.getElementById('emptyState');
        const sensors = await apiFetch('/api/sensors').then(r => r?.json()).catch(() => []);

        if (!sensors || sensors.length === 0) {
            container.innerHTML = '';
            emptyState.classList.remove('d-none');
            return;
        }

        emptyState.classList.add('d-none');
        container.innerHTML = sensors.map(s => `
            <div class="col-12 col-md-6 col-xl-4 sensor-card-enter">
                <div class="card bg-black border-secondary h-100">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-start mb-2">
                            <div>
                                <span class="fs-4 me-2">${TYPE_ICON[s.type] || '🔌'}</span>
                                <span class="fw-semibold">${s.name}</span>
                            </div>
                            <span class="badge ${STATUS_BADGE[s.status] || 'bg-secondary'}">${s.status}</span>
                        </div>
                        <p class="text-muted small mb-1">📍 ${s.location || 'No location set'}</p>
                        <p class="text-muted small mb-1">Type: ${s.type}</p>
                        <p class="text-muted small mb-0">Node ID: <code class="text-secondary">${s.nodeId}</code></p>
                        <p class="text-muted small mt-2 mb-0">
                            Last seen: ${s.lastSeen ? new Date(s.lastSeen).toLocaleString() : 'Never'}
                        </p>
                    </div>
                </div>
            </div>
        `).join('');
    }

    loadSensors();
</script>
</body>
</html>
