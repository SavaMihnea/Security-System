<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOXWALL — Sensors</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-dark text-white">

<nav class="navbar navbar-dark bg-black border-bottom border-secondary px-4">
    <a class="navbar-brand fw-bold" href="/dashboard.html">🛡 VOXWALL</a>
    <div class="d-flex gap-3 align-items-center">
        <a href="/dashboard.html" class="nav-link text-secondary">Dashboard</a>
        <a href="/sensors.html"   class="nav-link text-white fw-semibold active">Sensors</a>
        <a href="/events.html"    class="nav-link text-secondary">Events</a>
        <span class="text-muted small me-2" id="navUsername"></span>
        <button class="btn btn-sm btn-outline-secondary" onclick="logout()">Logout</button>
    </div>
</nav>

<div class="container-fluid px-4 py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="mb-0">Sensors</h4>
        <button class="btn btn-sm btn-outline-light" onclick="loadSensors()">↺ Refresh</button>
    </div>

    <div class="row g-3" id="sensorCards">
        <p class="text-muted">Loading...</p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/api.js"></script>
<script>
    requireAuth();
    document.getElementById('navUsername').textContent = localStorage.getItem('username') || '';

    const STATUS_BADGE = {
        ONLINE:    'bg-success',
        OFFLINE:   'bg-secondary',
        TRIGGERED: 'bg-danger',
        FAULT:     'bg-warning text-dark'
    };
    const TYPE_ICON = {
        MOTION:    '👁',
        VIBRATION: '📳',
        DOOR:      '🚪',
        CENTRAL:   '🖥'
    };

    async function loadSensors() {
        const container = document.getElementById('sensorCards');
        const sensors = await apiFetch('/api/sensors').then(r => r?.json()).catch(() => []);

        if (!sensors || sensors.length === 0) {
            container.innerHTML = '<p class="text-muted">No sensors registered yet. ' +
                'Flash and boot a sensor node to register it automatically.</p>';
            return;
        }

        container.innerHTML = sensors.map(s => `
            <div class="col-12 col-md-6 col-xl-4">
                <div class="card bg-black border-secondary h-100">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-start mb-2">
                            <div>
                                <span class="fs-4 me-2">${TYPE_ICON[s.type] || '🔌'}</span>
                                <span class="fw-semibold">${s.name}</span>
                            </div>
                            <span class="badge ${STATUS_BADGE[s.status] || 'bg-secondary'}">${s.status}</span>
                        </div>
                        <p class="text-muted small mb-1">📍 ${s.location || 'No location set'}</p>
                        <p class="text-muted small mb-1">Type: ${s.type}</p>
                        <p class="text-muted small mb-0">Node ID: <code class="text-secondary">${s.nodeId}</code></p>
                        <p class="text-muted small mt-2 mb-0">
                            Last seen: ${s.lastSeen ? new Date(s.lastSeen).toLocaleString() : 'Never'}
                        </p>
                    </div>
                </div>
            </div>
        `).join('');
    }

    loadSensors();
</script>
</body>
</html>
