<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script>document.documentElement.setAttribute('data-theme',localStorage.getItem('voxwall-theme')||'dark')</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VOXWALL - Events</title>
  <link rel="icon" type="image/png" href="/assets/keylogo.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="preload" as="image" href="/assets/keylogo.png">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body style="visibility:hidden;">

<nav class="vox-nav">
  <a class="vox-nav-brand" href="/dashboard">
    <span class="brand-dot"></span>VOXWALL SECURITY
  </a>
  <div class="vox-nav-links">
    <a href="/dashboard" class="vox-nav-link">Dashboard</a>
    <a href="/sensors"   class="vox-nav-link">Sensors</a>
    <a href="/events"    class="vox-nav-link active">Events</a>
    <a href="/help"      class="vox-nav-link">Help</a>
    <a href="/about"     class="vox-nav-link">About</a>
    <button id="btnSettings" class="vox-nav-logout" onclick="openSettingsModal()" style="background:none;">&#9881;</button>
    <button class="btn-theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme"></button>
    <button class="vox-nav-logout" onclick="logout()">Logout</button>
  </div>
  <button class="vox-nav-hamburger" onclick="toggleNavMenu()" aria-label="Menu">&#9776;</button>
</nav>

<div class="page-wrap">
  <div class="d-flex justify-content-between align-items-end mb-4 flex-wrap gap-3">
    <div class="page-header" style="margin:0;">
      <div class="page-eyebrow">Audit Log</div>
      <div class="page-title">Event Log</div>
    </div>
    <div class="d-flex gap-2">
      <button class="btn-arm btn-disarm" style="font-size:0.72rem;padding:8px 18px;" onclick="resolveAll()">Resolve All Active</button>
      <button class="btn-arm btn-arm-home" onclick="loadEvents()">Refresh</button>
    </div>
  </div>

  <!-- Filters -->
  <div class="d-flex gap-2 mb-3 flex-wrap align-items-center">
    <button class="vox-filter-btn active" data-filter="all"    onclick="setFilter('all',this)">All</button>
    <button class="vox-filter-btn"        data-filter="alerts" onclick="setFilter('alerts',this)">Alerts</button>
    <button class="vox-filter-btn"        data-filter="system" onclick="setFilter('system',this)">System</button>
    <button class="vox-filter-btn"        data-filter="errors" onclick="setFilter('errors',this)">Errors</button>
    <input type="text" class="vox-search" placeholder="Search events…" id="eventSearch" oninput="applyFilters()">
  </div>

  <div class="vox-card tac">
    <span class="tc-tr"></span><span class="tc-bl"></span>
    <div style="overflow-x:auto;">
      <table class="vox-table">
        <thead>
          <tr>
            <th>Time</th>
            <th>Event</th>
            <th>Sensor</th>
            <th>Notes</th>
            <th>Status</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="eventsTableBody">
          <tr><td colspan="6" style="text-align:center;color:var(--text-3);padding:36px;">Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="d-flex justify-content-between align-items-center mt-3">
    <span style="font-family:'JetBrains Mono',monospace;font-size:0.7rem;color:var(--text-3);" id="pageInfo"></span>
    <div class="d-flex gap-2">
      <button class="btn-outline-secondary btn btn-sm" id="prevBtn" onclick="changePage(-1)" disabled>Prev</button>
      <button class="btn-outline-secondary btn btn-sm" id="nextBtn" onclick="changePage(1)"  disabled>Next</button>
    </div>
  </div>
</div>

<!-- Resolve All confirmation modal -->
<div id="resolveAllModal" style="display:none;position:fixed;inset:0;z-index:1050;background:rgba(0,0,0,0.78);backdrop-filter:blur(4px);align-items:center;justify-content:center;">
  <div class="vox-card tac" style="position:relative;width:100%;max-width:400px;margin:20px;padding:32px 40px 30px;">
    <div style="font-family:'JetBrains Mono',monospace;font-size:0.62rem;font-weight:600;letter-spacing:0.24em;text-transform:uppercase;color:var(--red);text-shadow:var(--ts-glow-r);margin-bottom:18px;">Action Required</div>
    <div style="font-size:1.15rem;color:var(--text-1);font-weight:600;margin-bottom:10px;line-height:1.4;">
      Resolve all <span id="resolveAllN" style="font-family:'JetBrains Mono',monospace;color:var(--amber);font-weight:700;"></span> active alert(s)?
    </div>
    <div style="font-size:0.92rem;color:var(--text-3);margin-bottom:28px;line-height:1.5;">This will mark them as resolved and cannot be undone.</div>
    <div style="display:flex;gap:12px;">
      <button class="btn-arm btn-disarm" style="flex:1;font-size:0.88rem;padding:13px 0;" onclick="confirmResolveAll()">YES</button>
      <button class="vox-filter-btn" style="flex:1;font-size:0.78rem;padding:13px 0;" onclick="closeResolveAllModal()">CANCEL</button>
    </div>
  </div>
</div>

<!-- Resolve modal -->
<div class="modal fade" id="resolveModal" tabindex="-1">
  <div class="modal-dialog modal-sm modal-dialog-centered">
    <div class="modal-content" style="background:var(--bg-card);border:1px solid var(--border);border-radius:0;">
      <div class="modal-body text-center py-4" style="color:var(--text-1);">
        <p style="font-size:0.88rem;color:var(--text-2);margin-bottom:20px;">Mark this alert as resolved?</p>
        <div class="d-flex gap-2 justify-content-center">
          <button class="vox-filter-btn" data-bs-dismiss="modal">Cancel</button>
          <button class="btn-arm btn-arm-away" style="font-size:0.72rem;" id="confirmResolveBtn" onclick="confirmResolve()">Confirm</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/api.js"></script>
<script src="assets/js/settings.js"></script>
<script>
  requireAuth();
  if (!isAdmin()) { const g = document.getElementById('btnSettings'); if (g) g.style.display = 'none'; }

  const EVENT_BADGE = {
    ALARM_TRIGGERED:'bg-danger', SIREN_ACTIVE:'bg-danger',
    MOTION_DETECTED:'bg-warning', VIBRATION_DETECTED:'bg-warning',
    DOOR_OPENED:'bg-info', DOOR_CLOSED:'bg-secondary',
    SYSTEM_ARMED:'bg-primary', SYSTEM_DISARMED:'bg-secondary',
    NODE_ONLINE:'bg-success', NODE_OFFLINE:'bg-secondary',
    AI_CONVERSATION_STARTED:'bg-purple', HEARTBEAT:'bg-secondary', ALARM_DISARMED:'bg-primary'
  };

  const ALERT_TYPES  = new Set(['ALARM_TRIGGERED','SIREN_ACTIVE','MOTION_DETECTED','VIBRATION_DETECTED','DOOR_OPENED']);
  const SYSTEM_TYPES = new Set(['SYSTEM_ARMED','SYSTEM_DISARMED','NODE_ONLINE','NODE_OFFLINE','HEARTBEAT']);
  const ERROR_TYPES  = new Set(['ALARM_TRIGGERED','SIREN_ACTIVE']);

  let allEvents=[], filteredEvents=[], currentFilter='all', currentPage=0;
  const PAGE_SIZE=20;
  let resolveTargetId=null;

  function setFilter(filter,btn) {
    currentFilter=filter; currentPage=0;
    document.querySelectorAll('[data-filter]').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    applyFilters();
  }

  function applyFilters() {
    const q=document.getElementById('eventSearch').value.toLowerCase();
    filteredEvents=allEvents.filter(ev=>{
      if(currentFilter==='alerts'&&!ALERT_TYPES.has(ev.eventType)) return false;
      if(currentFilter==='system'&&!SYSTEM_TYPES.has(ev.eventType)) return false;
      if(currentFilter==='errors'&&!ERROR_TYPES.has(ev.eventType)) return false;
      if(q){const t=`${ev.eventType} ${ev.sensorName||''} ${ev.notes||''}`.toLowerCase();if(!t.includes(q))return false;}
      return true;
    });
    currentPage=0; renderPage();
  }

  function renderPage() {
    const page=filteredEvents.slice(currentPage*PAGE_SIZE,(currentPage+1)*PAGE_SIZE);
    const tbody=document.getElementById('eventsTableBody');
    if(!filteredEvents.length){
      tbody.innerHTML='<tr><td colspan="6" style="text-align:center;color:var(--text-3);padding:36px;">No events match your filters.</td></tr>';
    } else {
      tbody.innerHTML=page.map(ev=>`
        <tr class="${!ev.resolved&&ALERT_TYPES.has(ev.eventType)?'event-row-alert':''}">
          <td>${new Date(ev.timestamp).toLocaleString()}</td>
          <td><span class="badge ${EVENT_BADGE[ev.eventType]||'bg-secondary'}">${ev.eventType.replace(/_/g,' ')}</span></td>
          <td style="color:var(--text-2);">${ev.sensorName||'<span style="color:var(--text-4);">-</span>'}</td>
          <td style="color:var(--text-3);">${ev.notes||''}</td>
          <td>${ev.resolved
            ?`<span class="badge bg-secondary" title="${ev.resolvedAt?'Resolved '+new Date(ev.resolvedAt).toLocaleString():''}">Resolved${ev.resolvedAt?' '+new Date(ev.resolvedAt).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}):''}</span>`
            :'<span class="badge bg-danger">Active</span>'}</td>
          <td>${!ev.resolved?`<button class="vox-filter-btn" onclick="promptResolve(${ev.id})">Resolve</button>`:''}</td>
        </tr>`).join('');
    }
    const total=Math.ceil(filteredEvents.length/PAGE_SIZE);
    document.getElementById('pageInfo').textContent=filteredEvents.length?`Page ${currentPage+1} of ${total} · ${filteredEvents.length} events`:'';
    document.getElementById('prevBtn').disabled=currentPage<=0;
    document.getElementById('nextBtn').disabled=currentPage>=total-1;
  }

  function changePage(d){currentPage+=d;renderPage();}

  function promptResolve(id){resolveTargetId=id;new bootstrap.Modal(document.getElementById('resolveModal')).show();}

  async function confirmResolve(){
    if(resolveTargetId==null)return;
    await apiFetch(`/api/events/${resolveTargetId}/resolve`,{method:'PUT'});
    bootstrap.Modal.getInstance(document.getElementById('resolveModal')).hide();
    resolveTargetId=null; loadEvents();
  }

  function resolveAll(){
    const n=allEvents.filter(e=>!e.resolved).length;
    if(!n)return;
    document.getElementById('resolveAllN').textContent=n;
    document.getElementById('resolveAllModal').style.display='flex';
  }

  function closeResolveAllModal(){
    document.getElementById('resolveAllModal').style.display='none';
  }

  async function confirmResolveAll(){
    closeResolveAllModal();
    await apiFetch('/api/events/resolve-all',{method:'PUT'});
    loadEvents();
  }

  document.addEventListener('keydown',e=>{if(e.key==='Escape')closeResolveAllModal();});

  async function loadEvents(){
    const ev=await apiFetch('/api/events').then(r=>r?.json()).catch(()=>[]);
    allEvents=ev||[]; applyFilters();
  }

  loadEvents();
</script>
</body>
</html>
