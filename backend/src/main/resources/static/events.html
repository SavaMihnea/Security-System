<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOXWALL - Events</title>
    <link rel="icon" type="image/png" href="/assets/keylogo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    <link rel="preload" as="image" href="/assets/keylogo.png">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-dark text-white" style="visibility:hidden;">

<nav class="navbar navbar-dark bg-black border-bottom border-secondary px-4">
    <a class="navbar-brand" href="/dashboard" style="font-family:'Rajdhani','Segoe UI',sans-serif; font-weight:700; font-size:1.2rem; letter-spacing:0.15em; text-transform:uppercase; color:#fff; text-shadow:0 0 12px rgba(180,0,20,0.6);">VOXWALL SECURITY</a>
    <div class="d-flex gap-3 align-items-center">
        <a href="/dashboard" class="nav-link text-secondary">Dashboard</a>
        <a href="/sensors"   class="nav-link text-secondary">Sensors</a>
        <a href="/events"    class="nav-link text-white fw-semibold active">Events</a>
        <button class="btn btn-sm btn-outline-secondary" onclick="logout()">Logout</button>
    </div>
</nav>

<div class="container-fluid px-4 py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="mb-0">Event Log</h4>
        <button class="btn btn-sm btn-outline-light" onclick="loadEvents()">↺ Refresh</button>
    </div>

    <!-- Filters + Search -->
    <div class="d-flex gap-2 mb-3 flex-wrap align-items-center">
        <div class="btn-group" role="group">
            <button class="btn btn-sm btn-outline-secondary active" data-filter="all" onclick="setFilter('all', this)">All</button>
            <button class="btn btn-sm btn-outline-danger" data-filter="alerts" onclick="setFilter('alerts', this)">Alerts</button>
            <button class="btn btn-sm btn-outline-primary" data-filter="system" onclick="setFilter('system', this)">System</button>
            <button class="btn btn-sm btn-outline-warning" data-filter="errors" onclick="setFilter('errors', this)">Errors</button>
        </div>
        <input type="text" class="form-control form-control-sm bg-black text-white border-secondary" style="max-width:220px;" placeholder="Search events..." id="eventSearch" oninput="applyFilters()">
    </div>

    <div class="card bg-black border-secondary">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-dark table-hover mb-0">
                    <thead class="border-secondary">
                        <tr>
                            <th>Time</th>
                            <th>Event</th>
                            <th>Sensor</th>
                            <th>Notes</th>
                            <th>Status</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="eventsTableBody">
                        <tr><td colspan="6" class="text-center text-muted py-4">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Pagination -->
    <div class="d-flex justify-content-between align-items-center mt-3">
        <span class="text-muted small" id="pageInfo"></span>
        <div class="btn-group">
            <button class="btn btn-sm btn-outline-secondary" id="prevBtn" onclick="changePage(-1)" disabled>← Prev</button>
            <button class="btn btn-sm btn-outline-secondary" id="nextBtn" onclick="changePage(1)" disabled>Next →</button>
        </div>
    </div>
</div>

<!-- Resolve confirmation modal -->
<div class="modal fade" id="resolveModal" tabindex="-1">
    <div class="modal-dialog modal-sm modal-dialog-centered">
        <div class="modal-content bg-dark border-secondary text-white">
            <div class="modal-body text-center py-4">
                <p class="mb-3">Mark this alert as resolved?</p>
                <div class="d-flex gap-2 justify-content-center">
                    <button class="btn btn-sm btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button class="btn btn-sm btn-success" id="confirmResolveBtn" onclick="confirmResolve()">Resolve</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/api.js"></script>
<script>
    requireAuth();

    const EVENT_BADGE = {
        ALARM_TRIGGERED:    'bg-danger',
        MOTION_DETECTED:    'bg-warning text-dark',
        VIBRATION_DETECTED: 'bg-warning text-dark',
        DOOR_OPENED:        'bg-info text-dark',
        DOOR_CLOSED:        'bg-secondary',
        SYSTEM_ARMED:       'bg-primary',
        SYSTEM_DISARMED:    'bg-secondary',
        NODE_ONLINE:        'bg-success',
        NODE_OFFLINE:       'bg-secondary',
        AI_CONVERSATION_STARTED: 'bg-purple text-white',
        HEARTBEAT:          'bg-secondary',
        ALARM_DISARMED:     'bg-primary'
    };

    const ALERT_TYPES  = new Set(['ALARM_TRIGGERED','MOTION_DETECTED','VIBRATION_DETECTED','DOOR_OPENED']);
    const SYSTEM_TYPES = new Set(['SYSTEM_ARMED','SYSTEM_DISARMED','NODE_ONLINE','NODE_OFFLINE','HEARTBEAT']);
    const ERROR_TYPES  = new Set(['ALARM_TRIGGERED']);

    let allEvents = [];
    let filteredEvents = [];
    let currentFilter = 'all';
    let currentPage = 0;
    const PAGE_SIZE = 20;
    let resolveTargetId = null;

    function setFilter(filter, btn) {
        currentFilter = filter;
        currentPage = 0;
        document.querySelectorAll('[data-filter]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        applyFilters();
    }

    function applyFilters() {
        const query = document.getElementById('eventSearch').value.toLowerCase();
        filteredEvents = allEvents.filter(ev => {
            if (currentFilter === 'alerts' && !ALERT_TYPES.has(ev.eventType)) return false;
            if (currentFilter === 'system' && !SYSTEM_TYPES.has(ev.eventType)) return false;
            if (currentFilter === 'errors' && !ERROR_TYPES.has(ev.eventType)) return false;
            if (query) {
                const text = `${ev.eventType} ${ev.sensorName || ''} ${ev.notes || ''}`.toLowerCase();
                if (!text.includes(query)) return false;
            }
            return true;
        });
        currentPage = 0;
        renderPage();
    }

    function renderPage() {
        const start = currentPage * PAGE_SIZE;
        const page  = filteredEvents.slice(start, start + PAGE_SIZE);
        const tbody = document.getElementById('eventsTableBody');

        if (filteredEvents.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted py-4">No events match your filters.</td></tr>';
        } else {
            tbody.innerHTML = page.map(ev => `
                <tr class="${!ev.resolved && ALERT_TYPES.has(ev.eventType) ? 'event-row-alert' : ''}">
                    <td class="text-muted small">${new Date(ev.timestamp).toLocaleString()}</td>
                    <td>
                        <span class="badge ${EVENT_BADGE[ev.eventType] || 'bg-secondary'}">
                            ${ev.eventType.replace(/_/g, ' ')}
                        </span>
                    </td>
                    <td class="small">${ev.sensorName || '<span class="text-muted">—</span>'}</td>
                    <td class="small text-muted">${ev.notes || ''}</td>
                    <td>
                        ${ev.resolved
                            ? `<span class="badge bg-secondary" title="${ev.resolvedAt ? 'Resolved at ' + new Date(ev.resolvedAt).toLocaleString() : ''}">Resolved${ev.resolvedAt ? ' ' + new Date(ev.resolvedAt).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) : ''}</span>`
                            : '<span class="badge bg-danger">Active</span>'}
                    </td>
                    <td>
                        ${!ev.resolved
                            ? `<button class="btn btn-sm btn-outline-secondary py-0"
                                   onclick="promptResolve(${ev.id})">Resolve</button>`
                            : ''}
                    </td>
                </tr>
            `).join('');
        }

        const totalPages = Math.ceil(filteredEvents.length / PAGE_SIZE);
        document.getElementById('pageInfo').textContent = filteredEvents.length > 0
            ? `Page ${currentPage + 1} of ${totalPages} · ${filteredEvents.length} events`
            : '';
        document.getElementById('prevBtn').disabled = currentPage <= 0;
        document.getElementById('nextBtn').disabled = currentPage >= totalPages - 1;
    }

    function changePage(delta) {
        currentPage += delta;
        renderPage();
    }

    function promptResolve(id) {
        resolveTargetId = id;
        new bootstrap.Modal(document.getElementById('resolveModal')).show();
    }

    async function confirmResolve() {
        if (resolveTargetId == null) return;
        await apiFetch(`/api/events/${resolveTargetId}/resolve`, { method: 'PUT' });
        bootstrap.Modal.getInstance(document.getElementById('resolveModal')).hide();
        resolveTargetId = null;
        loadEvents();
    }

    async function loadEvents() {
        const events = await apiFetch('/api/events').then(r => r?.json()).catch(() => []);
        allEvents = events || [];
        applyFilters();
    }

    loadEvents();
</script>
</body>
</html>
