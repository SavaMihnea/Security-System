<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOXWALL — Dashboard</title>
    <link rel="icon" type="image/png" href="/assets/keylogo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-dark text-white" style="visibility:hidden;">

<!-- Navbar -->
<nav class="navbar navbar-dark bg-black border-bottom border-secondary px-4">
    <a class="navbar-brand" href="/dashboard.html" style="font-family:'Rajdhani','Segoe UI',sans-serif; font-weight:700; font-size:1.2rem; letter-spacing:0.15em; text-transform:uppercase; color:#fff; text-shadow:0 0 12px rgba(180,0,20,0.6);">VOXWALL SECURITY DASHBOARD</a>
    <div class="d-flex gap-3 align-items-center">
        <a href="/dashboard.html" class="nav-link text-white fw-semibold active">Dashboard</a>
        <a href="/sensors.html"   class="nav-link text-secondary">Sensors</a>
        <a href="/events.html"    class="nav-link text-secondary">Events</a>
        <span class="text-muted small me-2" id="navUsername"></span>
        <button class="btn btn-sm btn-outline-secondary" onclick="logout()">Logout</button>
    </div>
</nav>

<div class="container-fluid px-4 py-4">

    <!-- Logo -->
    <div class="text-center mb-4">
        <img src="/assets/keylogo.png" alt="VOXWALL" style="height:160px; view-transition-name: main-logo;">
    </div>

    <!-- System status banner -->
    <div class="row mb-4">
        <div class="col-12">
            <div id="statusBanner" class="status-banner status-disarmed p-4 rounded-3 text-center">
                <div class="status-icon mb-2" id="statusIcon">🔓</div>
                <h1 class="fs-2 fw-bold mb-1" id="statusText">DISARMED</h1>
                <p class="text-muted small mb-3" id="statusMeta">—</p>
                <div class="d-flex gap-2 justify-content-center flex-wrap">
                    <button id="btnArmAway" class="btn btn-sentinel px-4" onclick="arm('ARMED_AWAY')">
                        🔒 Arm Away
                    </button>
                    <button id="btnArmHome" class="btn btn-outline-light px-4" onclick="arm('ARMED_HOME')">
                        🏠 Arm Home
                    </button>
                    <button id="btnArmHomeNight" class="btn btn-outline-warning px-4" onclick="arm('ARMED_HOME_NIGHT')">
                        🌙 Arm Night
                    </button>
                    <button id="btnDisarm" class="btn btn-danger px-4 d-none" onclick="disarm()">
                        🔓 Disarm
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Stats row -->
    <div class="row g-3 mb-4">
        <div class="col-6 col-md-3">
            <div class="stat-card">
                <div class="stat-label">Total Sensors</div>
                <div class="stat-value" id="statTotalSensors">—</div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="stat-card">
                <div class="stat-label">Online</div>
                <div class="stat-value text-success" id="statOnline">—</div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="stat-card">
                <div class="stat-label">Active Alarms</div>
                <div class="stat-value text-danger" id="statAlarms">—</div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="stat-card">
                <div class="stat-label">WS Connection</div>
                <div class="stat-value" id="statWs">—</div>
            </div>
        </div>
    </div>

    <!-- Sensors grid + Recent events -->
    <div class="row g-4">
        <div class="col-lg-6">
            <div class="card bg-black border-secondary">
                <div class="card-header border-secondary d-flex justify-content-between align-items-center">
                    <span class="fw-semibold">Sensor Status</span>
                    <a href="/sensors.html" class="text-muted small">View all →</a>
                </div>
                <div class="card-body p-0">
                    <div id="sensorGrid" class="p-3">
                        <p class="text-muted small text-center py-3">Loading sensors...</p>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-lg-6">
            <div class="card bg-black border-secondary">
                <div class="card-header border-secondary d-flex justify-content-between align-items-center">
                    <span class="fw-semibold">Recent Events</span>
                    <a href="/events.html" class="text-muted small">View all →</a>
                </div>
                <div class="card-body p-0">
                    <div id="recentEvents">
                        <p class="text-muted small text-center py-3">Loading events...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Toast notification for real-time alerts -->
<div class="toast-container position-fixed bottom-0 end-0 p-3">
    <div id="alertToast" class="toast text-bg-danger" role="alert">
        <div class="toast-header text-bg-danger">
            <strong class="me-auto">⚠ ALERT</strong>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="toast"></button>
        </div>
        <div class="toast-body" id="alertToastBody"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1.6.1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7.0.0/bundles/stomp.umd.min.js"></script>
<script src="assets/js/api.js"></script>
<script src="assets/js/dashboard.js"></script>
</body>
</html>
