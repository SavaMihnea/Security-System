<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOXWALL - Login</title>
    <link rel="icon" type="image/png" href="/assets/keylogo.png">
    <link rel="preload" as="image" href="/assets/keylogo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="login-body">

<video class="login-video-bg" autoplay muted loop playsinline preload="auto">
    <source src="/assets/earth.mp4" type="video/mp4">
</video>


<div class="login-center">

  <!-- Label above card -->
  <div class="login-terminal-id">
    <span class="login-terminal-dot"></span>
    VXW-AUTH-01 &nbsp;/&nbsp; SECURE CHANNEL ESTABLISHED
  </div>

  <div class="login-card">
    <!-- Status bar -->
    <div class="login-status-row">
      <span class="login-status-dot"></span>
      <span class="login-status-text">ENCRYPTED CHANNEL ACTIVE</span>
      <span class="login-status-tag">AES-256</span>
    </div>

    <!-- Brand -->
    <div class="login-brand">VOXWALL<br>SECURITY</div>
    <div class="login-motto">Control the unseen.</div>

    <!-- Decorative rule -->
    <div class="login-rule">
      <div class="login-rule-line"></div>
      <div class="login-rule-diamond"></div>
      <div class="login-rule-line"></div>
    </div>

    <form id="loginForm">
      <div class="login-field">
        <label for="username" class="login-label">Operator ID</label>
        <input type="text" class="form-control form-control-dark" id="username"
               autocomplete="username" required>
      </div>
      <div class="login-field">
        <label for="password" class="login-label">Access Code</label>
        <div class="position-relative">
          <input type="password" class="form-control form-control-dark pe-5" id="password"
                 autocomplete="current-password" required>
          <button type="button" class="login-pw-toggle" onclick="togglePassword()"
                  tabindex="-1" aria-label="Toggle visibility">
            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <button type="submit" class="btn-signin" id="loginBtn">
        <span id="loginBtnText">PROCEED</span>
        <svg class="btn-signin-arrow" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="square"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      </button>
      <div id="errorMsg" class="login-error-msg d-none" role="alert"></div>
    </form>
  </div>

  <!-- Label below card -->
  <div class="login-node-id">VOXWALL SECURITY SYSTEM &nbsp;&#8226;&nbsp; v2.1.0 &nbsp;&#8226;&nbsp; RAILWAY CLOUD</div>

</div>

<!-- Footer -->
<div class="login-footer">
  <span>&#169; VOXWALL SECURITY 2025 &nbsp;&nbsp; All rights reserved</span>
</div>

<script>
    if (localStorage.getItem('jwt_token')) {
        window.location.href = '/dashboard';
    }

    function togglePassword() {
        const pw = document.getElementById('password');
        pw.type = pw.type === 'password' ? 'text' : 'password';
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn    = document.getElementById('loginBtn');
        const btnTxt = document.getElementById('loginBtnText');
        const errMsg = document.getElementById('errorMsg');
        const arrow  = btn.querySelector('.btn-signin-arrow');

        btn.disabled = true;
        btnTxt.textContent = 'AUTHENTICATING';
        if (arrow) arrow.style.display = 'none';
        errMsg.classList.add('d-none');

        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;

        try {
            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            if (res.ok) {
                const data = await res.json();
                localStorage.setItem('jwt_token', data.token);
                localStorage.setItem('username', data.username);
                localStorage.setItem('user_role', data.role || 'USER');
                window.location.href = '/dashboard';
            } else if (res.status === 423) {
                const data = await res.json();
                errMsg.textContent = data.error || 'Account locked. Too many failed attempts.';
                errMsg.classList.remove('d-none');
                btn.disabled = false; btnTxt.textContent = 'PROCEED'; if (arrow) arrow.style.display = '';
            } else {
                errMsg.textContent = 'Invalid operator ID or access code.';
                errMsg.classList.remove('d-none');
                btn.disabled = false; btnTxt.textContent = 'PROCEED'; if (arrow) arrow.style.display = '';
            }
        } catch {
            errMsg.textContent = 'Cannot reach the server. Check your connection.';
            errMsg.classList.remove('d-none');
            btn.disabled = false; btnTxt.textContent = 'PROCEED'; if (arrow) arrow.style.display = '';
        }
    });
</script>
</body>
</html>
