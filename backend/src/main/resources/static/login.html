<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOXWALL — Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-dark d-flex align-items-center justify-content-center min-vh-100">

<div class="login-card">
    <div class="text-center mb-4">
        <img src="/logo.png" alt="VOXWALL" class="mb-3" style="height:120px;">
        <p class="text-muted small">Security System Control Panel</p>
    </div>

    <div id="errorMsg" class="alert alert-danger d-none" role="alert"></div>

    <form id="loginForm">
        <div class="mb-3">
            <label for="username" class="form-label text-secondary">Username</label>
            <input type="text" class="form-control form-control-dark" id="username"
                   placeholder="admin" autocomplete="username" required>
        </div>
        <div class="mb-4">
            <label for="password" class="form-label text-secondary">Password</label>
            <input type="password" class="form-control form-control-dark" id="password"
                   autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn btn-sentinel w-100" id="loginBtn">
            Sign In
        </button>
    </form>
</div>

<script>
    // Redirect if already logged in
    if (localStorage.getItem('jwt_token')) {
        window.location.href = '/dashboard.html';
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('loginBtn');
        const errMsg = document.getElementById('errorMsg');

        btn.disabled = true;
        btn.textContent = 'Signing in...';
        errMsg.classList.add('d-none');

        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;

        try {
            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            if (res.ok) {
                const data = await res.json();
                localStorage.setItem('jwt_token', data.token);
                localStorage.setItem('username', data.username);
                window.location.href = '/dashboard.html';
            } else if (res.status === 423) {
                const data = await res.json();
                errMsg.textContent = data.error || 'Account locked. Too many failed attempts.';
                errMsg.classList.remove('d-none');
            } else {
                errMsg.textContent = 'Invalid username or password.';
                errMsg.classList.remove('d-none');
            }
        } catch {
            errMsg.textContent = 'Cannot reach the server. Check your connection.';
            errMsg.classList.remove('d-none');
        } finally {
            btn.disabled = false;
            btn.textContent = 'Sign In';
        }
    });
</script>
</body>
</html>
