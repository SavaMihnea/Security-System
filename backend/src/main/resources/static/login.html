<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOXWALL - Login</title>
    <link rel="icon" type="image/png" href="/assets/keylogo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    <link rel="preload" as="image" href="/assets/keylogo.png">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-dark d-flex align-items-center justify-content-center min-vh-100" style="position:relative; z-index:0;">

<!-- Decorative background trapezoids -->
<svg class="login-trapezoids" viewBox="0 0 1000 900" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
    <!-- Outer large dark grey trapezoid -->
    <polygon points="10, 60 990, 60 700, 790 300, 790" fill="#111111" stroke="rgba(180,0,0,0.6)" stroke-width="2.5"/>
    <!-- Inner smaller black trapezoid -->
    <polygon points="190, 106 810, 106 670, 460 330, 460" fill="#000000" stroke="rgba(180,0,0,0.6)" stroke-width="2.5"/>
</svg>

<div class="login-card">
    <div class="text-center mb-3">
        <h1 class="login-brand mb-2" style="font-size: 2.3rem;">VOXWALL SECURITY</h1>
        <img src="/assets/keylogo.png" alt="VOXWALL" class="my-2" fetchpriority="high" style="width:80%; max-width:440px; height:auto; display:block; margin-left: 40px; margin-right:auto; view-transition-name: main-logo;">
        <p class="login-motto mt-3" style="font-size: 1.3rem;">Control the unseen.</p>
    </div>

    <form id="loginForm">
        <div class="mb-3 mx-auto" style="margin-top: 40px; max-width: 260px;">
            <label for="username" class="form-label login-label">Username</label>
            <input type="text" class="form-control form-control-dark" id="username"
                   autocomplete="username" required>
        </div>
        <div class="mb-4 mx-auto" style="max-width: 260px;">
            <label for="password" class="form-label login-label">Password</label>
            <input type="password" class="form-control form-control-dark" id="password"
                   autocomplete="current-password" required>
        </div>
        <div class="mx-auto" style="max-width: 260px;">
            <button type="submit" class="btn btn-signin w-100" id="loginBtn">
                Proceed
            </button>
        </div>
        <div class="mx-auto" style="max-width: 260px; min-height: 2.2rem; display: flex; align-items: center; justify-content: center;">
            <div id="errorMsg" class="login-error-msg d-none" role="alert"></div>
        </div>
    </form>
</div>

<script>
    // Redirect if already logged in
    if (localStorage.getItem('jwt_token')) {
        window.location.href = '/dashboard';
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('loginBtn');
        const errMsg = document.getElementById('errorMsg');

        btn.disabled = true;
        btn.textContent = 'Loading assets...';
        errMsg.classList.add('d-none');

        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;

        try {
            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            if (res.ok) {
                const data = await res.json();
                localStorage.setItem('jwt_token', data.token);
                localStorage.setItem('username', data.username);
                window.location.href = '/dashboard';
            } else if (res.status === 423) {
                const data = await res.json();
                errMsg.textContent = data.error || 'Account locked. Too many failed attempts.';
                errMsg.classList.remove('d-none');
                btn.disabled = false;
                btn.textContent = 'Proceed';
            } else {
                errMsg.textContent = 'Invalid username or password.';
                errMsg.classList.remove('d-none');
                btn.disabled = false;
                btn.textContent = 'Proceed';
            }
        } catch {
            errMsg.textContent = 'Cannot reach the server. Check your connection.';
            errMsg.classList.remove('d-none');
            btn.disabled = false;
            btn.textContent = 'Proceed';
        }
    });
</script>
</body>
</html>
